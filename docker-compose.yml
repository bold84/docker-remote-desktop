version: '3.8'

services:
  remote-desktop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TAG: noble
    image: docker-remote-desktop-ben:latest
    container_name: remote-desktop-ben
    hostname: remote-desktop
    restart: unless-stopped
    
    # Port mapping for RDP
    ports:
      - "${RDP_PORT:-3389}:3389/tcp"
    
    # Environment variables for configuration
    environment:
      - USER_NAME=${USER_NAME:-ubuntu}
      - USER_PASSWORD=${USER_PASSWORD:-ubuntu}
      - USER_UID=${USER_UID:-1020}
      - USER_GID=${USER_GID:-1020}
    
    # Persist user home directory
    volumes:
      - ./home:/home
      # Optional: Mount custom SSL certificates for TLS encryption
      # - ./certs:/etc/xrdp:ro
      # Optional: Mount Docker socket for Docker-in-Docker (alternative to running dockerd inside container)
      # - /var/run/docker.sock:/var/run/docker.sock
    
    # Shared memory size for browser support
    shm_size: 2gb
    
    # Capabilities needed for Chromium-based browsers and Docker-in-Docker
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          memory: 4G
