version: '3.8'

services:
  remote-desktop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TAG: noble
    image: docker-remote-desktop:latest
    container_name: remote-desktop
    hostname: remote-desktop
    restart: unless-stopped
    
    # Port mapping for RDP
    ports:
      - "3389:3389/tcp"
    
    # Environment variables for configuration
    environment:
      - USER_NAME=${USER_NAME:-ubuntu}
      - USER_PASSWORD=${USER_PASSWORD:-ubuntu}
      - USER_UID=${USER_UID:-1020}
      - USER_GID=${USER_GID:-1020}
    
    # Optional: Mount custom SSL certificates for TLS encryption
    # volumes:
    #   - ./certs:/etc/xrdp:ro
    
    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 512M

  # Alternative: Production-ready configuration with SSL
  remote-desktop-secure:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TAG: noble
    image: docker-remote-desktop:latest
    container_name: remote-desktop-secure
    hostname: remote-desktop-secure
    restart: unless-stopped
    ports:
      - "3389:3389/tcp"
    environment:
      - USER_NAME=ubuntu
      # Set your password via .env file or environment
      - USER_PASSWORD=${USER_PASSWORD:-ubuntu}
    # Uncomment to persist SSL certificates
    # volumes:
    #   - xrdp-certs:/etc/xrdp
    # Uncomment for persistent home directory
    #   - user-home:/home/ubuntu

# Uncomment for named volumes
# volumes:
#   xrdp-certs:
#   user-home:
