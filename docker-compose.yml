version: '3.8'

services:
  remote-desktop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TAG: noble
    image: docker-remote-desktop:latest
    container_name: remote-desktop
    hostname: remote-desktop
    restart: unless-stopped
    
    # Port mapping for RDP
    ports:
      - "${RDP_PORT:-3389}:3389/tcp"
    
    # Environment variables for configuration
    environment:
      - USER_NAME=${USER_NAME:-ubuntu}
      - USER_PASSWORD=${USER_PASSWORD:-ubuntu}
      - USER_UID=${USER_UID:-1020}
      - USER_GID=${USER_GID:-1020}
    
    # Persist user home directory
    volumes:
      - ./home/${USER_NAME:-ubuntu}:/home/${USER_NAME:-ubuntu}
    
    # Optional: Mount custom SSL certificates for TLS encryption
    # volumes:
    #   - ./certs:/etc/xrdp:ro
    
    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
    #     reservations:
    #       cpus: '1'
    #       memory: 512M
